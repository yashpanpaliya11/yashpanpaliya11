<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes slide {
      0% { transform: translateX(0); }
      100% { transform: translateX(-500px); }
    }
    @keyframes pulse {
       0% { transform: scale(1); transform-origin: center; }
       50% { transform: scale(1.05); transform-origin: center; }
       100% { transform: scale(1); transform-origin: center; }
    }
    .text-main { font: 900 45px 'Segoe UI', sans-serif; fill: black; }
    .text-sub { font: 700 20px 'Segoe UI', sans-serif; fill: black; }
    .text-status { font: 900 14px 'Segoe UI', sans-serif; fill: white; }
    .marquee { font: 900 18px 'Courier New', monospace; fill: black; }
  </style>

  <!-- Background Card with Shadow -->
  <rect x="5" y="5" width="790" height="190" fill="black" />
  <rect x="0" y="0" width="790" height="190" fill="#FFEE00" stroke="black" stroke-width="4" />

  <!-- Top Window Bar -->
  <rect x="0" y="0" width="790" height="35" fill="black" />
  <text x="15" y="24" class="text-status">YASH_PANPALIYA.EXE // SYSTEM:ONLINE</text>
  
  <!-- Window Buttons -->
  <circle cx="765" cy="17" r="6" fill="#00FF00" />
  <circle cx="745" cy="17" r="6" fill="#FFFF00" />
  <circle cx="725" cy="17" r="6" fill="#FF0000" />

  <!-- Main Content -->
  <text x="40" y="100" class="text-main">HELLO WORLD</text>
  <rect x="330" y="65" width="25" height="45" fill="black">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
  </rect>

  <rect x="40" y="115" width="220" height="35" fill="#FF00F7" stroke="black" stroke-width="3" />
  <text x="50" y="140" class="text-sub">UNDERGRAD @ NST</text>

  <!-- Floating Badge -->
  <g style="animation: pulse 2s ease-in-out infinite;">
    <rect x="580" y="60" width="150" height="70" fill="#00F0FF" stroke="black" stroke-width="4" transform="rotate(5 655 95)" />
    <text x="595" y="102" class="text-sub" transform="rotate(5 655 95)" style="font-size: 16px;">1ST YEAR ELITE</text>
  </g>

  <!-- Bottom Marquee Bar -->
  <rect x="0" y="165" width="790" height="35" fill="#00FF00" stroke="black" stroke-width="3" />
  <g>
    <text x="20" y="188" class="marquee">
      PYTHON // GOLANG // BLENDER // BASH // NOTION // GITHUB // MATPLOTLIB // PYTHON // GOLANG // BLENDER
      <animate attributeName="x" from="800" to="-800" dur="15s" repeatCount="indefinite" />
    </text>
  </g>
</svg>
